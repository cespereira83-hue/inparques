allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(':app')

    // --- INICIO DEL PARCHE DE SEGURIDAD ---
    // Esto obliga a usar versiones estables de librerías conflictivas
    project.configurations.all {
        resolutionStrategy {
            eachDependency { details ->
                if (details.requested.group == 'androidx.activity' && details.requested.name == 'activity') {
                    details.useVersion '1.9.3'
                }
            }
        }
    }
    // --- FIN DEL PARCHE DE SEGURIDAD ---
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}